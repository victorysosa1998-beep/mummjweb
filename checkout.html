<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Mummy J</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9f9f9; padding: 40px 5%; color: #12256B; }
        .payment-card { background: white; max-width: 500px; margin: auto; padding: 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h1 { font-family: 'Anton'; font-size: 32px; margin-bottom: 20px; text-transform: uppercase; }
        .account-box { background: #F2F2F2; padding: 25px; border-radius: 20px; margin: 25px 0; border-left: 5px solid #446CFF; position: relative; }
        .account-box p { margin: 5px 0; font-weight: 700; }
        .label { font-size: 11px; color: #666; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }
        .total-banner { font-size: 26px; font-weight: 800; border-bottom: 2px solid #eee; padding-bottom: 15px; display: flex; justify-content: space-between; }
        .btn-confirm { background: #25d366; color: white; display: block; text-align: center; padding: 22px; border-radius: 18px; text-decoration: none; font-weight: 800; margin-top: 30px; cursor: pointer; border: none; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-confirm:hover { transform: scale(1.02); background: #20ba5a; }
        .instruction { font-size: 14px; color: #555; line-height: 1.6; }
        .copy-tag { position: absolute; right: 20px; top: 45px; font-size: 10px; background: #446CFF; color: white; padding: 4px 8px; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="payment-card">
    <h1>Complete Order</h1>
    <div class="total-banner">
        <span style="font-size: 14px; font-weight: 400; color: #666;">Amount Due:</span>
        <span id="finalTotal">₦0</span>
    </div>
    
    <p class="instruction" style="margin-top: 20px;">Transfer the total amount to the account below. Once done, click the <b>Payment Made</b> button to notify the admin via WhatsApp.</p>

    <div class="account-box">
        <span class="label">Bank Name</span>
        <p>MoniePoint</p>
        <br>
        <span class="label">Account Number</span>
        <p id="accNum" style="font-size: 24px; letter-spacing: 1px;">6390425408</p>
        <a href="javascript:void(0)" class="copy-tag" onclick="copyAcc()">COPY</a>
        <br>
        <span class="label">Account Name</span>
        <p>MUMMY J EMPORIUM OR AKPAN FREEDOM VICTORIA</p>
    </div>

    <button id="payMadeBtn" class="btn-confirm">✅ I HAVE MADE PAYMENT</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlGgRRrPP67b7EHyYm_eL1R08zFi08aLg",
        authDomain: "mummy-jweb.firebaseapp.com",
        projectId: "mummy-jweb",
        storageBucket: "mummy-jweb.firebasestorage.app",
        messagingSenderId: "924167105238",
        appId: "1:924167105238:web:56261faee1ca1ee9d7b777",
        measurementId: "G-YMNFG7RV4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const cart = JSON.parse(localStorage.getItem('mj_cart')) || [];
    const customer = JSON.parse(localStorage.getItem('mj_customer')) || { name: "Guest", phone: "N/A", address: "N/A" };
    const waNumber = "2348123541592"; 
    let runningTotal = 0;

    let receiptID = "MJ-" + Math.floor(1000 + Math.random() * 9000);
    let textSummary = `*ORDER RECEIPT: ${receiptID}*\n`;
    textSummary += `━━━━━━━━━━━━━━━━━━━━\n`;
    textSummary += `*CUSTOMER DETAILS*\n`;
    textSummary += `Name: ${customer.name}\n`;
    textSummary += `Phone: ${customer.phone}\n`;
    textSummary += `Address: ${customer.address}\n`;
    textSummary += `━━━━━━━━━━━━━━━━━━━━\n`;
    textSummary += `*MUMMY J EMPORIUM*\n`;
    textSummary += `Date: ${new Date().toLocaleDateString()}\n`;
    textSummary += `━━━━━━━━━━━━━━━━━━━━\n\n`;

    if (cart.length > 0) {
        cart.forEach(item => {
            const rawPrice = item.price ? String(item.price).replace(/[^\d.-]/g, '') : "0";
            const itemPrice = parseFloat(rawPrice) || 0;
            const itemQty = parseInt(item.qty) || 1;
            
            let itemSubtotal = itemPrice * itemQty;
            runningTotal += itemSubtotal;
            
            textSummary += `🔹 *${item.name || 'Product'}*\n`;
            textSummary += `   Color: ${item.color || 'Standard'} | Qty: ${itemQty}\n`;
            textSummary += `   Price: ₦${itemSubtotal.toLocaleString()}\n\n`;
        });

        textSummary += `━━━━━━━━━━━━━━━━━━━━\n`;
        textSummary += `*TOTAL PAID: ₦${runningTotal.toLocaleString()}*\n`;
        textSummary += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        textSummary += `✅ _I have successfully transferred the funds._\n`;
        textSummary += `_Please verify and process my order._`;

        document.getElementById('finalTotal').innerText = `₦${runningTotal.toLocaleString()}`;
    } else {
        alert("Session expired or cart empty. Please return to store.");
    }

    document.getElementById('payMadeBtn').addEventListener('click', async function() {
        if(runningTotal === 0) {
            alert("No items found in your order.");
            return;
        }

        this.innerText = "RECORDING ORDER...";
        this.style.opacity = "0.7";
        this.disabled = true;

        const waUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(textSummary)}`;

        try {
            await addDoc(collection(db, "orders"), {
                orderID: receiptID,
                customerName: customer.name,
                customerPhone: customer.phone,
                customerAddress: customer.address,
                totalAmount: runningTotal,
                customerCart: cart,
                status: "Pending Verification",
                createdAt: serverTimestamp()
            });

            localStorage.removeItem('mj_cart');
            localStorage.removeItem('mj_customer');
            window.location.replace(waUrl);

        } catch (error) {
            console.error("Firestore Error:", error);
            localStorage.removeItem('mj_cart');
            localStorage.removeItem('mj_customer');
            window.location.replace(waUrl);
        }
    });

    window.copyAcc = function() {
        const num = document.getElementById('accNum').innerText;
        navigator.clipboard.writeText(num).catch(err => {
            const textArea = document.createElement("textarea");
            textArea.value = num;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
        });
    }
</script>

</body>
</html>
