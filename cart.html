<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Mummy J</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #12256B;
            --blue: #446CFF;
        }
        body { font-family: 'Inter', sans-serif; padding: 50px 5%; color: var(--navy); background-color: #fcfcfc; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-family: 'Anton'; font-size: 36px; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; }
        
        .cart-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 25px; 
            background: white;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            gap: 20px; 
            transition: transform 0.2s ease;
        }
        .cart-item:hover { transform: translateY(-2px); }
        
        .item-link {
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            flex: 1;
        }

        .cart-item img { width: 100px; height: 100px; object-fit: contain; border-radius: 12px; background: #f2f2f2; }
        .item-details { flex: 1; }
        .item-details h3 { font-size: 18px; margin-bottom: 5px; text-transform: uppercase; }
        .item-details p { font-size: 14px; color: #666; margin-bottom: 5px; }
        
        .qty-controls { display: flex; align-items: center; gap: 12px; margin-top: 15px; }
        .qty-btn { 
            background: #f0f0f0; 
            border: none; 
            width: 32px; 
            height: 32px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn:hover { background: #e0e0e0; color: var(--blue); }
        .qty-val { font-weight: 800; min-width: 24px; text-align: center; }
        
        .remove-btn { 
            color: #ff4444; 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 12px; 
            margin-top: 12px; 
            font-weight: 700;
            text-transform: uppercase;
            padding: 0;
            letter-spacing: 0.5px;
        }
        
        .cart-summary {
            margin-top: 40px;
            padding: 30px;
            background: white;
            border-radius: 25px;
            text-align: right;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        #totalDisplay { font-weight: 800; font-size: 32px; color: var(--navy); margin-top: 5px; }
        
        .checkout-btn { 
            background: var(--navy); 
            color: white; 
            padding: 22px; 
            text-decoration: none; 
            display: block; 
            text-align: center; 
            border-radius: 18px; 
            font-weight: 700; 
            margin-top: 20px; 
            font-size: 16px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        .checkout-btn:hover { background: var(--blue); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(68, 108, 255, 0.3); }
        .checkout-btn.disabled {
            background: #ccc;
            pointer-events: none;
            box-shadow: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-content h2 { margin-top: 0; font-family: 'Anton'; letter-spacing: 1px; }
        .modal-content input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: 'Inter';
            box-sizing: border-box;
        }
        .modal-content input:focus { border-color: var(--blue); outline: none; }
        .confirm-order-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .cart-item { flex-direction: column; text-align: center; }
            .item-link { flex-direction: column; }
            .qty-controls { justify-content: center; }
            .item-price-info { text-align: center !important; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MY CART</h1>
        <div id="cartContent"></div>
        
        <div class="cart-summary">
            <p style="color: #666; font-size: 14px; font-weight: 600;">ESTIMATED TOTAL</p>
            <div id="totalDisplay">₦0</div>
            <button id="checkoutBtn" class="checkout-btn">PROCEED TO CHECKOUT</button>
            <a href="index.html" style="display: block; text-align: center; margin-top: 20px; color: var(--navy); text-decoration: none; font-size: 14px; font-weight: 700;">← Continue Shopping</a>
        </div>
    </div>

    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content">
            <h2>DELIVERY DETAILS</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Please provide your details to complete the order.</p>
            <input type="text" id="custName" placeholder="Full Name" required>
            <input type="text" id="custPhone" placeholder="Phone Number" required>
            <input type="text" id="custAddress" placeholder="Delivery Address" required>
            <button class="confirm-order-btn" id="confirmOrder">CONFIRM & GO TO PAYMENT</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#999; width:100%; margin-top:15px; cursor:pointer; font-weight:600;">Cancel</button>
        </div>
    </div>

    <script>
        const checkoutModal = document.getElementById('checkoutModal');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const confirmOrderBtn = document.getElementById('confirmOrder');

        checkoutBtn.addEventListener('click', () => {
            checkoutModal.style.display = 'flex';
        });

        window.closeModal = function() {
            checkoutModal.style.display = 'none';
        }

        confirmOrderBtn.addEventListener('click', () => {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            if(!name || !phone || !address) {
                alert("Please fill in all details");
                return;
            }

            // Save user info to use on checkout page
            const customerData = { name, phone, address };
            localStorage.setItem('mj_customer', JSON.stringify(customerData));

            // Move to checkout WITHOUT clearing cart yet
            window.location.href = "checkout.html";
        });

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('mj_cart')) || [];
            const container = document.getElementById('cartContent');
            const totalDisplay = document.getElementById('totalDisplay');
            let total = 0;
            
            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 60px 0;"><p style="font-size: 18px; color: #888;">Your cart is currently empty.</p></div>`;
                totalDisplay.innerText = "₦0";
                checkoutBtn.classList.add('disabled');
                return;
            }

            checkoutBtn.classList.remove('disabled');

            cart.forEach((item, index) => {
                const cleanPriceStr = String(item.price).replace(/[^0-9.]/g, '');
                const itemPrice = parseFloat(cleanPriceStr) || 0;
                const itemQty = parseInt(item.qty) || 1;
                const itemTotal = itemPrice * itemQty;
                total += itemTotal;

                container.innerHTML += `
                    <div class="cart-item">
                        <a href="product-details.html?id=${item.id}" class="item-link">
                            <img src="${item.img || item.image}" alt="${item.name}">
                            <div class="item-details">
                                <h3>${item.name}</h3>
                                <p>Variant: <b>${item.color || 'Standard'}</b></p>
                            </div>
                        </a>
                        <div class="controls-wrapper">
                             <div class="qty-controls">
                                <button type="button" class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                                <span class="qty-val">${itemQty}</span>
                                <button type="button" class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                            </div>
                            <button type="button" class="remove-btn" onclick="removeItem(${index})">Remove Item</button>
                        </div>
                        <div class="item-price-info" style="text-align: right">
                            <p style="font-weight:800; font-size: 20px; color: var(--navy);">₦${itemTotal.toLocaleString()}</p>
                            <p style="font-size: 12px; color: #999;">₦${itemPrice.toLocaleString()} each</p>
                        </div>
                    </div>
                `;
            });
            totalDisplay.innerText = `₦${total.toLocaleString()}`;
        }

        window.changeQty = function(index, delta) {
            let cart = JSON.parse(localStorage.getItem('mj_cart')) || [];
            if (cart[index]) {
                let currentQty = parseInt(cart[index].qty) || 1;
                cart[index].qty = Math.max(1, Math.min(99, currentQty + delta));
                localStorage.setItem('mj_cart', JSON.stringify(cart));
                renderCart();
            }
        }

        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem('mj_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('mj_cart', JSON.stringify(cart));
            renderCart();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
