<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Mummy J Emporium</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #12256B;
            --blue: #446CFF;
            --bg: #F2F2F2;
            --red: #ff3b30;
            --success: #28a745;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 40px 20px; color: var(--navy); }
        .upload-container { max-width: 650px; margin: 0 auto 30px auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-family: 'Anton'; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; 
            box-sizing: border-box; outline: none; font-family: 'Inter'; font-size: 15px;
        }
        
        .color-adder-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .color-preview-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; min-height: 40px; }
        .color-chip { 
            background: #f0f0f0; padding: 8px 15px; border-radius: 25px; 
            display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700;
        }
        .chip-circle { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .remove-chip { cursor: pointer; color: var(--red); font-size: 18px; line-height: 1; }

        .btn-upload { 
            background: var(--navy); color: white; border: none; width: 100%; 
            padding: 20px; border-radius: 15px; font-weight: 800; cursor: pointer; 
            font-size: 16px; transition: 0.3s;
        }
        .btn-upload:hover { background: var(--blue); }

        .inventory-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; border-bottom: 1px solid #eee; background: #fff; border-radius: 15px; margin-bottom: 10px;
        }
        .status-badge { font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 20px; text-transform: uppercase; }
        .status-in { background: #e8f5e9; color: var(--success); }
        .status-out { background: #ffebee; color: var(--red); }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-action { border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 12px; }

        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 37, 107, 0.9); z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center; color: white; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="loading-text">Processing Request...</div>
</div>

<div class="upload-container">
    <h1>ADD NEW PRODUCT</h1>
    
    <div class="form-group">
        <label>Main Image URL</label>
        <input type="text" id="imageUrl" placeholder="Paste link to bag image">
    </div>

    <div class="form-group">
        <label>Extra Image 1 (Optional)</label>
        <input type="text" id="imageUrl2" placeholder="Paste second image link">
    </div>

    <div class="form-group">
        <label>Extra Image 2 (Optional)</label>
        <input type="text" id="imageUrl3" placeholder="Paste third image link">
    </div>

    <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="itemName" placeholder="e.g. Vernissage Leather Tote">
    </div>

    <div class="form-group">
        <label>Target Category</label>
        <select id="itemCategory">
            <option value="handbag">Handbag</option>
            <option value="wallet">Wallet</option>
            <option value="new arrivals">New Arrivals</option>
            <option value="accessories">Accessories</option>
        </select>
    </div>

    <div class="form-group">
        <label>Price (₦)</label>
        <input type="number" id="itemPrice" placeholder="55000">
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea id="itemDesc" rows="3" placeholder="Details about size, material, etc."></textarea>
    </div>

    <div class="form-group">
        <label>Available Colors</label>
        <div class="color-adder-row">
            <input type="text" id="colorName" placeholder="Color Name" style="flex:2">
            <input type="color" id="colorHex" style="flex:1; height: 50px; padding: 5px; cursor: pointer;">
            <button type="button" onclick="addColor()" style="padding: 0 20px; border-radius: 12px; background: #eee; border: none; font-weight: 700; cursor: pointer;">Add</button>
        </div>
        <div id="colorPreviewList" class="color-preview-list"></div>
    </div>

    <button class="btn-upload" onclick="uploadProduct()">PUBLISH TO STORE</button>
</div>

<div class="upload-container">
    <h1>INVENTORY MANAGEMENT</h1>
    <div id="inventoryList">
        <p style="text-align: center; color: #888;">Fetching products...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlGgRRrPP67b7EHyYm_eL1R08zFi08aLg",
        authDomain: "mummy-jweb.firebaseapp.com",
        projectId: "mummy-jweb",
        storageBucket: "mummy-jweb.firebasestorage.app",
        messagingSenderId: "924167105238",
        appId: "1:924167105238:web:56261faee1ca1ee9d7b777"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const ADMIN_UID = "tPgPOqy3aPU4HeIAvWm6t64N3hG3";

    let tempColors = [];

    onAuthStateChanged(auth, (user) => {
        if (!user || user.uid !== ADMIN_UID) {
            window.location.href = "login.html";
        } else {
            loadInventory();
        }
    });

    window.addColor = () => {
        const name = document.getElementById('colorName').value;
        const hex = document.getElementById('colorHex').value;
        if(!name) return alert("Enter color name first");
        
        tempColors.push({ name, hex });
        document.getElementById('colorName').value = "";
        renderColorChips();
    };

    window.removeColor = (index) => {
        tempColors.splice(index, 1);
        renderColorChips();
    };

    function renderColorChips() {
        const list = document.getElementById('colorPreviewList');
        list.innerHTML = tempColors.map((c, i) => `
            <div class="color-chip">
                <div class="chip-circle" style="background:${c.hex}"></div>
                ${c.name}
                <span class="remove-chip" onclick="removeColor(${i})">&times;</span>
            </div>
        `).join('');
    }

    window.uploadProduct = async () => {
        const overlay = document.getElementById('loadingOverlay');
        const name = document.getElementById('itemName').value;
        const category = document.getElementById('itemCategory').value; // Get Category Value
        const price = document.getElementById('itemPrice').value;
        const img1 = document.getElementById('imageUrl').value;
        const img2 = document.getElementById('imageUrl2').value;
        const img3 = document.getElementById('imageUrl3').value;
        const desc = document.getElementById('itemDesc').value;

        if(!name || !price || !img1) return alert("Fill required fields!");

        const images = [img1];
        if(img2) images.push(img2);
        if(img3) images.push(img3);

        try {
            overlay.style.display = 'flex';
            await addDoc(collection(db, "products"), {
                name,
                category, // Save Category to Firestore
                price: Number(price),
                img: img1, 
                images: images,
                description: desc,
                colors: tempColors,
                inStock: true,
                createdAt: serverTimestamp()
            });
            alert("Success!");
            location.reload();
        } catch(e) { alert(e.message); overlay.style.display = 'none'; }
    };

    async function loadInventory() {
        const container = document.getElementById('inventoryList');
        try {
            const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            container.innerHTML = "";
            snap.forEach((pDoc) => {
                const p = pDoc.data();
                const isStock = p.inStock !== false;
                const div = document.createElement('div');
                div.className = "inventory-item";
                div.innerHTML = `
                    <div>
                        <strong>${p.name}</strong> <span style="font-size:10px; color:#666;">(${p.category || 'uncategorized'})</span><br>
                        <span class="status-badge ${isStock ? 'status-in' : 'status-out'}">${isStock ? 'In Stock' : 'Out of Stock'}</span>
                    </div>
                    <div class="action-btns">
                        <button class="btn-action" style="background:var(--navy); color:white;" onclick="toggleStatus('${pDoc.id}', ${isStock})">Toggle Status</button>
                        <button class="btn-action" style="background:#eee; color:red;" onclick="deleteItem('${pDoc.id}')">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch(e) { container.innerHTML = "Load failed."; }
    }

    window.toggleStatus = async (id, current) => {
        await updateDoc(doc(db, "products", id), { inStock: !current });
        loadInventory();
    };

    window.deleteItem = async (id) => {
        if(confirm("Delete this?")) {
            await deleteDoc(doc(db, "products", id));
            loadInventory();
        }
    };
</script>
</body>
</html>
